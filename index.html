<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CyberGuard — AI Security Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #020810;
            --surface: #060f1e;
            --card: #0a1628;
            --border: #0d2040;
            --neon-cyan: #00f5ff;
            --neon-green: #00ff88;
            --neon-pink: #ff0080;
            --neon-yellow: #f4d03f;
            --text: #c8e0f4;
            --muted: #4a6a8a;
            --font-head: 'Orbitron', monospace;
            --font-mono: 'Share Tech Mono', monospace;
            --font-body: 'Exo 2', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); overflow-x: hidden; cursor: none; }

        .cursor { width: 12px; height: 12px; border-radius: 50%; background: var(--neon-cyan); position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--neon-cyan); }
        .cursor-ring { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(0,245,255,0.4); position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: transform 0.1s; }
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.15; }

        #app { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; }

        header {
            padding: 1.2rem 3rem;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(2, 8, 16, 0.85); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-shield { filter: drop-shadow(0 0 8px var(--neon-cyan)); animation: pulse 3s infinite; }
        .logo-text { font-family: var(--font-head); font-size: 1.4rem; font-weight: 900; letter-spacing: 0.15em; color: var(--neon-cyan); text-shadow: 0 0 20px var(--neon-cyan); }
        .header-status { display: flex; align-items: center; gap: 0.6rem; font-family: var(--font-mono); font-size: 0.75rem; color: var(--neon-green); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }
        @keyframes pulse { 50% { opacity: 0.6; } }

        .hero { padding: 8rem 2rem 4rem; text-align: center; }
        .hero-title { font-family: var(--font-head); font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; color: #fff; line-height: 1; margin-bottom: 0.5rem; }
        .hero-title span { color: var(--neon-pink); text-shadow: 0 0 40px var(--neon-pink); display: block; }
        .hero-desc { color: var(--muted); font-size: 1.1rem; max-width: 600px; margin: 2rem auto; line-height: 1.6; }

        .nav-tabs { display: flex; gap: 1px; justify-content: center; margin: 2rem auto; background: rgba(6,15,30,0.8); border: 1px solid var(--border); border-radius: 10px; padding: 5px; width: fit-content; }
        .tab-btn { padding: 12px 24px; border: none; background: transparent; color: var(--muted); font-family: var(--font-mono); font-size: 0.85rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn.active { background: var(--neon-cyan); color: #000; border-radius: 6px; box-shadow: 0 0 20px rgba(0,245,255,0.4); font-weight: bold; }

        .content-area { max-width: 850px; margin: 0 auto; padding-bottom: 5rem; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .tool-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; position: relative; }
        textarea, input { width: 100%; background: #010409; border: 1px solid var(--border); border-radius: 8px; padding: 1.2rem; color: #fff; font-family: var(--font-mono); margin-bottom: 1.5rem; outline: none; }
        .btn { width: 100%; padding: 1.2rem; border-radius: 8px; border: none; background: var(--neon-cyan); color: #000; font-family: var(--font-head); font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn:hover { box-shadow: 0 0 25px var(--neon-cyan); transform: translateY(-2px); }

        .loading-box { display: none; justify-content: center; align-items: center; gap: 1rem; color: var(--neon-cyan); font-family: var(--font-mono); margin-top: 1rem; }
        .loading-box.visible { display: flex; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(0,245,255,0.2); border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result-box { display: none; background: rgba(0,245,255,0.05); border: 1px solid var(--neon-cyan); border-radius: 10px; padding: 1.5rem; margin-top: 2rem; }
        .result-box.visible { display: block; }
        .verdict { display: inline-block; padding: 0.5rem 1rem; border-radius: 4px; font-weight: 900; margin-bottom: 1rem; text-transform: uppercase; }
        
        /* Status Colors */
        .safe { background: var(--neon-green); color: #000; }
        .danger { background: var(--neon-pink); color: #fff; }
        .fake { background: var(--neon-pink); color: #fff; }
        .real { background: var(--neon-green); color: #000; }
        .suspicious { background: var(--neon-yellow); color: #000; }

        footer { padding: 2rem; border-top: 1px solid var(--border); text-align: center; font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); }
    </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<canvas id="matrix-bg"></canvas>

<div id="app">
    <header>
        <div class="logo">
            <svg class="logo-shield" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#00f5ff" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                <path d="M12 8v4M12 16h.01"></path>
            </svg>
            <div class="logo-text">CYBERGUARD</div>
        </div>
        <div class="header-status"><div class="status-dot"></div> SYSTEM ONLINE</div>
    </header>

    <div class="hero">
        <h1 class="hero-title">DETECT. ANALYZE. <span>NEUTRALIZE.</span></h1>
        <p class="hero-desc">AI-powered threat detection combining high-speed Llama 3.3 intelligence with real-time forensic analysis.</p>
        
        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('fake', this)">Fake News</button>
            <button class="tab-btn" onclick="switchTab('threat', this)">Threat Intel</button>
            <button class="tab-btn" onclick="switchTab('phish', this)">Phishing</button>
            <button class="tab-btn" onclick="switchTab('link', this)">Link Checker</button>
        </nav>
    </div>

    <div class="content-area">
        <div class="tab-panel active" id="panel-fake">
            <div class="tool-card">
                <textarea id="fakeInput" placeholder="Paste article text or headline..."></textarea>
                <button class="btn" onclick="analyze('fake')">ANALYZE NEWS INTEGRITY</button>
                <div class="loading-box" id="fake-loading"><div class="spinner"></div> SCRUTINIZING CONTENT...</div>
                <div class="result-box" id="fake-result">
                    <div id="fake-verdict-ui"></div>
                    <p id="fake-summary"></p>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="panel-threat">
            <div class="tool-card">
                <input type="text" id="threatInput" placeholder="Enter IP, Domain or Hash...">
                <button class="btn" onclick="analyze('threat')">INVESTIGATE THREAT</button>
                <div class="loading-box" id="threat-loading"><div class="spinner"></div> SCANNING DATABASES...</div>
                <div class="result-box" id="threat-result">
                    <div id="threat-verdict-ui"></div>
                    <p id="threat-summary"></p>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="panel-phish">
            <div class="tool-card">
                <textarea id="phishInput" placeholder="Paste email content..."></textarea>
                <button class="btn" onclick="analyze('phish')">CHECK FOR PHISHING</button>
                <div class="loading-box" id="phish-loading"><div class="spinner"></div> DETECTING SPOOFING...</div>
                <div class="result-box" id="phish-result">
                    <div id="phish-verdict-ui"></div>
                    <p id="phish-summary"></p>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="panel-link">
            <div class="tool-card">
                <input type="text" id="linkInput" placeholder="Enter URL (https://...)">
                <button class="btn" onclick="analyze('link')">VALIDATE LINK SAFETY</button>
                <div class="loading-box" id="link-loading"><div class="spinner"></div> ANALYZING REDIRECTS...</div>
                <div class="result-box" id="link-result">
                    <div id="link-verdict-ui"></div>
                    <p id="link-summary"></p>
                </div>
            </div>
        </div>
    </div>

    <footer>CYBERGUARD v2.4 // POWERED BY GROQ CLOUD</footer>
</div>

<script>
    const KEY = "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";

    // --- MATRIX ENGINE ---
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    const chars = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789";
    const drops = Array(Math.floor(width/16)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(2, 8, 16, 0.1)";
        ctx.fillRect(0,0,width,height);
        ctx.fillStyle = "#00f5ff";
        ctx.font = "16px monospace";
        drops.forEach((y, i) => {
            ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*16, y*16);
            if(y*16 > height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);

    // --- LOGIC ---
    async function analyze(type) {
        const text = document.getElementById(type+'Input').value;
        if(!text) return;
        document.getElementById(type+'-loading').classList.add('visible');
        document.getElementById(type+'-result').classList.remove('visible');

        let systemPrompt = "";
        if(type === 'fake') {
            systemPrompt = "You are a news fact-checker. Analyze the text for accuracy. Return ONLY JSON with keys 'verdict' (must be 'REAL' or 'FAKE') and 'summary' (brief explanation).";
        } else if(type === 'link') {
            systemPrompt = "You are a cybersecurity expert. Analyze the URL for phishing, malicious patterns, or suspicious redirects. Return ONLY JSON with keys 'verdict' (must be 'SAFE' or 'DANGER') and 'summary' (brief technical explanation).";
        } else {
            systemPrompt = `Analyze the provided ${type} content for security risks. Return ONLY JSON: {"verdict": "SAFE/DANGER", "summary": "Reasoning"}`;
        }

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {"Authorization": `Bearer ${KEY}`, "Content-Type": "application/json"},
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        {role: "system", content: systemPrompt},
                        {role: "user", content: `Analyze: ${text}`}
                    ],
                    response_format: {type: "json_object"}
                })
            });
            const data = await res.json();
            const result = JSON.parse(data.choices[0].message.content);
            
            const ui = document.getElementById(type+'-verdict-ui');
            const v = result.verdict.toUpperCase();
            
            // Map verdicts to CSS classes
            ui.className = 'verdict';
            if (v === 'REAL' || v === 'SAFE') ui.classList.add('safe');
            else if (v === 'FAKE' || v === 'DANGER') ui.classList.add('danger');
            else ui.classList.add('suspicious');

            ui.innerText = v;
            document.getElementById(type+'-summary').innerText = result.summary;
            document.getElementById(type+'-result').classList.add('visible');
        } catch(e) { 
            console.error(e);
            alert("Analysis Error. Check Console."); 
        }
        document.getElementById(type+'-loading').classList.remove('visible');
    }

    function switchTab(t, b) {
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.getElementById('panel-'+t).classList.add('active');
    }

    document.addEventListener('mousemove', e => {
        document.getElementById('cursor').style.left = e.clientX+'px';
        document.getElementById('cursor').style.top = e.clientY+'px';
        document.getElementById('cursorRing').style.left = e.clientX+'px';
        document.getElementById('cursorRing').style.top = e.clientY+'px';
    });
</script>
</body>
</html>
